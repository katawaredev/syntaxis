[package]
name = "syntaxis"
version = "0.1.0"
authors = ["Nikolay Stoynov <arvigeus@gmail.com>"]
edition = "2021"
license = "MIT"

[workspace]
members = ["crates/ui", "crates/workspace", "crates/workspace-host"]
resolver = "2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-trait = "0.1.89"
dioxus = { version = "0.7.1", features = ["router", "fullstack"] }
dioxus-code = { git = "https://github.com/DioxusLabs/dioxus-code", rev = "928568e248ebcda602ee0c071af44dfef849ec15", default-features = false, features = ["macro"] }
dioxus-primitives = { git = "https://github.com/DioxusLabs/dioxus-components", rev = "bf007c15d0cf4d04d3181cc46cf12325aa773955" }
syntaxis-ui = { path = "crates/ui" }
syntaxis-workspace = { path = "crates/workspace" }
syntaxis-workspace-host = { path = "crates/workspace-host", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3.0", features = ["futures"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.46.1", features = ["rt"], optional = true }

[features]
default = ["web"]
web = ["dioxus/web"]
desktop = ["dioxus/desktop", "dep:syntaxis-workspace-host", "dep:tokio"]
mobile = ["dioxus/mobile"]
server = ["dioxus/server", "dep:syntaxis-workspace-host", "dep:tokio"]

[lints]
workspace = true

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
